<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时互动照片墙（全设备同步）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; font-family: Arial; }

    /* 评论飘屏动画 */
    .comment {
      position: fixed;
      background: rgba(255,255,255,0.95);
      color: #222;
      padding: 8px 14px;
      border-radius: 50px;
      font-size: 14px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      animation: float 6s linear forwards;
      white-space: nowrap;
      z-index: 999;
    }
    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px); opacity: 0; }
    }

    /* 随机照片动画 */
    .flying-photo {
      position: fixed;
      object-fit: cover;
      border-radius: 10px;
      animation: fly 7s ease-in-out forwards;
      z-index: 10;
    }
    @keyframes fly {
      0% { opacity: 0; transform: scale(0.8); }
      20% { opacity: 1; transform: scale(1); }
      80% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8); }
    }

    /* 上传操作栏 */
    .upload-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 10px 15px;
      border-radius: 20px;
      display: flex;
      gap: 10px;
      z-index: 9999;
    }
    #file { display: none; }
    button, input[type="text"] {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }
    input[type="text"] {
      border: 1px solid #ddd;
      min-width: 160px;
    }
    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="upload-panel">
    <input type="file" id="file" accept="image/*">
    <button onclick="selectPhoto()">📸 上传照片</button>
    <input type="text" id="msg" placeholder="说点什么..." autocomplete="off">
    <button onclick="sendComment()">💬 发送评论</button>
  </div>

  <!-- 引入 Pusher 官方 JS -->
  <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>

  <script>
    // ======================================
    // 你的专属 Pusher 配置（已填好）
    // ======================================
    const PUSHER_APP_ID = "2138688";
    const PUSHER_KEY = "8cefeeb240825fe33ba3";
    const PUSHER_SECRET = "1271c274a381c8215d9c";
    const PUSHER_CLUSTER = "ap3";
    const CHANNEL_NAME = "photo-wall";

    // 初始化 Pusher（仅用于接收消息）
    const pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER });
    const channel = pusher.subscribe(CHANNEL_NAME);

    // 全局数据
    let photos = [];
    let comments = [];
    const msgInput = document.getElementById('msg');
    const fileInput = document.getElementById('file');

    // ======================================
    // 监听 Pusher 服务端事件（接收消息）
    // ======================================
    // 接收照片消息
    channel.bind('new-photo', (data) => {
      photos.push(data.url);
    });
    // 接收评论消息
    channel.bind('new-comment', (data) => {
      comments.push(data.text);
      playOneComment(data.text); // 立即播放新评论
    });

    // ======================================
    // 核心修复：用 HTTP API 发送服务端事件（绕过客户端事件限制）
    // ======================================
    async function sendPusherEvent(eventName, data) {
      // Pusher 服务端 API 地址
      const apiUrl = `https://api-${PUSHER_CLUSTER}.pusher.com/apps/${PUSHER_APP_ID}/events`;
      
      // 构造请求参数（Pusher 要求的格式）
      const params = new URLSearchParams();
      params.append('name', eventName);       // 事件名（无 client- 前缀）
      params.append('channels', CHANNEL_NAME); // 频道名
      params.append('data', JSON.stringify(data)); // 消息内容
      params.append('auth_key', PUSHER_KEY);  // 你的 key
      params.append('auth_secret', PUSHER_SECRET); // 你的 secret
      params.append('auth_timestamp', Math.floor(Date.now() / 1000)); // 时间戳
      params.append('auth_version', '1.0');   // 版本固定

      try {
        // 发送 POST 请求到 Pusher 服务端 API
        await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params
        });
      } catch (err) {
        console.log('发送消息失败:', err);
      }
    }

    // ======================================
    // 选择照片
    // ======================================
    function selectPhoto() {
      fileInput.click();
    }

    // ======================================
    // 照片转 Base64（跨设备可用）
    // ======================================
    function fileToBase64(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    // ======================================
    // 上传照片（同步到所有设备）
    // ======================================
    fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const base64Url = await fileToBase64(file);
      // 发送服务端事件（无 client- 前缀）
      sendPusherEvent('new-photo', { url: base64Url });
    };

    // ======================================
    // 发送评论（同步到所有设备）
    // ======================================
    function sendComment() {
      const text = msgInput.value.trim();
      if (!text) return;
      msgInput.value = '';
      // 发送服务端事件（无 client- 前缀）
      sendPusherEvent('new-comment', { text: text });
    }

    // ======================================
    // 评论飘屏播放
    // ======================================
    function playOneComment(text) {
      const div = document.createElement('div');
      div.className = 'comment';
      div.innerText = text;
      div.style.left = Math.random() * 80 + 10 + 'vw';
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 6000);
    }

    // ======================================
    // 随机照片播放
    // ======================================
    function playRandomPhoto() {
      if (photos.length === 0) return;
      const randomUrl = photos[Math.floor(Math.random() * photos.length)];
      const img = new Image();
      img.src = randomUrl;
      img.className = 'flying-photo';

      // 随机大小（100~280px）
      const size = Math.random() * 180 + 100;
      img.style.width = size + 'px';
      img.style.height = size + 'px';
      // 随机位置
      img.style.left = Math.random() * (window.innerWidth - size) + 'px';
      img.style.top = Math.random() * (window.innerHeight - size) + 'px';

      document.body.appendChild(img);
      setTimeout(() => img.remove(), 7000);
    }

    // ======================================
    // 自动循环播放
    // ======================================
    // 循环播放评论
    setInterval(() => {
      if (comments.length > 0) {
        const randomText = comments[Math.floor(Math.random() * comments.length)];
        playOneComment(randomText);
      }
    }, 4000);

    // 循环播放照片
    setInterval(() => {
      playRandomPhoto();
    }, 2000);
  </script>
</body>
</html>
