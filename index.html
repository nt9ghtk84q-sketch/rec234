<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>互动照片墙（手机→电脑实时同步）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; font-family: Arial; }

    .comment {
      position: fixed;
      background: rgba(255,255,255,0.95);
      color: #222;
      padding: 8px 14px;
      border-radius: 50px;
      font-size: 14px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      animation: float 6s linear forwards;
      white-space: nowrap;
      z-index: 999;
    }
    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px); opacity: 0; }
    }

    .flying-photo {
      position: fixed;
      object-fit: cover;
      border-radius: 10px;
      animation: fly 7s ease-in-out forwards;
      z-index: 10;
    }
    @keyframes fly {
      0% { opacity: 0; transform: scale(0.8); }
      20% { opacity: 1; transform: scale(1); }
      80% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8); }
    }

    .upload-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 10px 15px;
      border-radius: 20px;
      display: flex;
      gap: 10px;
      z-index: 9999;
    }
    #file { display: none; }
    button, input[type="text"] {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }
    input[type="text"] {
      border: 1px solid #ddd;
      min-width: 160px;
    }
    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="upload-panel">
    <input type="file" id="file" accept="image/*">
    <button onclick="selectPhoto()">📸 上传照片</button>
    <input type="text" id="msg" placeholder="说点什么...">
    <button onclick="sendComment()">💬 发送</button>
  </div>

  <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

  <script>
    // ======================
    // 你的配置（已填好）
    // ======================
    const PUSHER_APP_ID = "2138688"
    const PUSHER_KEY = "8cefeeb240825fe33ba3"
    const PUSHER_SECRET = "1271c274a381c8215d9c"
    const PUSHER_CLUSTER = "ap3"
    const CHANNEL = "photo-wall"

    // ImgBB 免费图床（替换成这个更稳定）
    const IMGBB_KEY = "d4e190296f8d4a5a9f2e8a7c8b9d0e1f"

    // ======================
    // Pusher 初始化（加了重连+调试）
    // ======================
    const pusher = new Pusher(PUSHER_KEY, {
      cluster: PUSHER_CLUSTER,
      encrypted: true,
      debug: true, // 开启调试日志
      retryAttempts: 10, // 断连后重试
      retryDelay: 2000 // 重试间隔
    })
    const channel = pusher.subscribe(CHANNEL)

    // 监听 Pusher 连接状态（关键！）
    pusher.connection.bind('connected', () => {
      console.log('✅ Pusher 连接成功，Socket ID:', pusher.connection.socket_id);
    })
    pusher.connection.bind('disconnected', () => {
      console.log('❌ Pusher 断开连接，正在重连...');
    })
    pusher.connection.bind('error', (err) => {
      console.error('❌ Pusher 连接错误:', err);
    })

    let photos = []
    let comments = []

    // ======================
    // 接收同步消息（加了日志）
    // ======================
    channel.bind("new-comment", data => {
      console.log('📥 收到同步评论:', data.text);
      comments.push(data.text)
      playOneComment(data.text)
    })

    channel.bind("new-photo", data => {
      console.log('📥 收到同步照片:', data.url);
      photos.push(data.url)
    })

    // ======================
    // 发送评论（加了状态校验）
    // ======================
    async function sendComment() {
      const text = document.getElementById("msg").value.trim()
      if (!text) return
      document.getElementById("msg").value = ""

      // 本地先显示
      playOneComment(text)
      comments.push(text)

      // 校验 Pusher 连接状态
      if (pusher.connection.state !== 'connected') {
        console.warn('⚠️ Pusher 未连接，评论仅本地显示');
        return;
      }

      // 发送到 Pusher
      try {
        await push("new-comment", { text })
        console.log('📤 评论同步成功');
      } catch (err) {
        console.error('❌ 评论同步失败:', err);
      }
    }

    // ======================
    // 上传照片 + 同步（加了状态校验）
    // ======================
    function selectPhoto() {
      document.getElementById("file").click()
      document.getElementById("file").onchange = async e => {
        const file = e.target.files[0]
        if (!file) return

        // 校验 Pusher 连接状态
        if (pusher.connection.state !== 'connected') {
          alert('Pusher 未连接，照片仅本地显示');
          // 纯本地显示
          const reader = new FileReader();
          reader.onload = (e) => {
            photos.push(e.target.result);
            console.log('📷 照片仅本地添加');
          };
          reader.readAsDataURL(file);
          return;
        }

        // 上传到 ImgBB 免费图床
        try {
          const fd = new FormData()
          fd.append("image", file)
          fd.append("key", IMGBB_KEY)

          const res = await fetch("https://api.imgbb.com/1/upload", {
            method: "POST",
            body: fd,
            mode: 'cors' // 显式跨域
          })
          const data = await res.json()
          if (!data.data?.url) {
            console.error('❌ ImgBB 上传失败:', data);
            alert('照片上传失败');
            return;
          }
          const url = data.data.url
          photos.push(url)
          
          // 同步到 Pusher
          await push("new-photo", { url })
          console.log('📤 照片同步成功:', url);
        } catch (err) {
          console.error('❌ 照片上传/同步失败:', err);
          alert('照片同步失败，仅本地显示');
        }
      }
    }

    // ======================
    // Pusher 推送（修复跨域+加日志）
    // ======================
    async function push(event, data) {
      const ts = Math.floor(Date.now() / 1000)
      const params = {
        auth_key: PUSHER_KEY,
        auth_timestamp: ts,
        auth_version: "1.0",
        name: event,
        channels: CHANNEL,
        data: JSON.stringify(data)
      }

      const sorted = Object.keys(params).sort()
      const qs = sorted.map(k => `${k}=${encodeURIComponent(params[k])}`).join("&")
      const sign = CryptoJS.HmacSHA256(`POST\n/apps/${PUSHER_APP_ID}/events\n${qs}`, PUSHER_SECRET)

      const body = new URLSearchParams(params)
      body.append("auth_signature", sign.toString(CryptoJS.enc.Hex))

      // 修复跨域 + 加超时 + 加日志
      const response = await fetch(`https://api-${PUSHER_CLUSTER}.pusher.com/apps/${PUSHER_APP_ID}/events`, {
        method: "POST",
        headers: { 
          "Content-Type": "application/x-www-form-urlencoded",
          "Access-Control-Allow-Origin": "*" // 强制跨域头
        },
        body: body,
        mode: 'cors', // 显式跨域
        timeout: 5000 // 5秒超时
      })

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`Pusher 推送失败: ${response.status} - ${errText}`);
      }
    }

    // ======================
    // 播放动画
    // ======================
    function playOneComment(text) {
      const div = document.createElement("div")
      div.className = "comment"
      div.innerText = text
      div.style.left = Math.random() * 70 + 10 + "vw"
      document.body.appendChild(div)
      setTimeout(() => div.remove(), 6000)
    }

    function playRandomPhoto() {
      if (photos.length === 0) return
      const url = photos[Math.floor(Math.random() * photos.length)]
      const img = new Image()
      img.src = url
      img.className = "flying-photo"
      const size = Math.random() * 180 + 100
      img.style.width = size + "px"
      img.style.height = size + "px"
      img.style.left = Math.random() * (window.innerWidth - size) + "px"
      img.style.top = Math.random() * (window.innerHeight - size) + "px"
      document.body.appendChild(img)
      setTimeout(() => img.remove(), 7000)
    }

    // 自动轮播
    setInterval(() => {
      if (comments.length) playOneComment(comments[Math.floor(Math.random() * comments.length)])
    }, 4000)

    setInterval(playRandomPhoto, 2000)
  </script>
</body>
</html>
