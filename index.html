<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时互动照片墙（多端同步）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; font-family: Arial; }

    /* 评论飘屏 */
    .comment {
      position: fixed;
      background: rgba(255,255,255,0.95);
      color: #222;
      padding: 8px 14px;
      border-radius: 50px;
      font-size: 14px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      animation: float 6s linear forwards;
      white-space: nowrap;
      z-index: 999;
    }
    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px); opacity: 0; }
    }

    /* 随机照片 */
    .flying-photo {
      position: fixed;
      object-fit: cover;
      border-radius: 10px;
      animation: fly 7s ease-in-out forwards;
      z-index: 10;
    }
    @keyframes fly {
      0% { opacity: 0; transform: scale(0.8); }
      20% { opacity: 1; transform: scale(1); }
      80% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8); }
    }

    /* 上传栏 */
    .upload-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 10px 15px;
      border-radius: 20px;
      display: flex;
      gap: 10px;
      z-index: 9999;
    }
    #file { display: none; }
    button, input[type="text"] {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }
    input[type="text"] {
      border: 1px solid #ddd;
      min-width: 160px;
    }
    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="upload-panel">
    <input type="file" id="file" accept="image/*">
    <button onclick="selectPhoto()">📸 上传照片</button>
    <input type="text" id="msg" placeholder="说点什么..." autocomplete="off">
    <button onclick="sendComment()">💬 发送评论</button>
  </div>

  <script>
    // ======================================
    // 核心：原生实时同步通道（多设备秒同步）
    // ======================================
    const channel = new BroadcastChannel('photo_wall');
    let photos = [];
    let comments = [];

    // DOM
    const msgInput = document.getElementById('msg');
    const fileInput = document.getElementById('file');

    // ======================================
    // 监听其他设备发送的消息
    // ======================================
    channel.onmessage = (e) => {
      const data = e.data;
      if (data.type === 'photo') {
        photos.push(data.url);
      }
      if (data.type === 'comment') {
        comments.push(data.text);
        playOneComment(data.text); // 直接播放
      }
    };

    // ======================================
    // 选择照片
    // ======================================
    function selectPhoto() {
      fileInput.click();
    }

    // ======================================
    // 照片转Base64（跨设备可用）
    // ======================================
    function fileToBase64(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    // ======================================
    // 上传照片 + 同步所有设备
    // ======================================
    fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const base64 = await fileToBase64(file);
      photos.push(base64);
      // 广播给所有打开网页的设备
      channel.postMessage({ type: 'photo', url: base64 });
    };

    // ======================================
    // 发送评论 + 同步所有设备
    // ======================================
    function sendComment() {
      const text = msgInput.value.trim();
      if (!text) return;
      comments.push(text);
      msgInput.value = '';
      // 广播给所有打开网页的设备
      channel.postMessage({ type: 'comment', text: text });
    }

    // ======================================
    // 评论飘屏
    // ======================================
    function playOneComment(text) {
      const div = document.createElement('div');
      div.className = 'comment';
      div.innerText = text;
      div.style.left = Math.random() * 80 + 10 + 'vw';
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 6000);
    }

    // ======================================
    // 随机播放照片
    // ======================================
    function playRandomPhoto() {
      if (photos.length === 0) return;
      const url = photos[Math.floor(Math.random() * photos.length)];
      const img = new Image();
      img.src = url;
      img.className = 'flying-photo';

      const size = Math.random() * 180 + 100;
      img.style.width = size + 'px';
      img.style.height = size + 'px';
      img.style.left = Math.random() * (window.innerWidth - size) + 'px';
      img.style.top = Math.random() * (window.innerHeight - size) + 'px';

      document.body.appendChild(img);
      setTimeout(() => img.remove(), 7000);
    }

    // ======================================
    // 自动循环
    // ======================================
    setInterval(() => {
      if (comments.length) playOneComment(comments[Math.floor(Math.random() * comments.length)]);
    }, 4000);

    setInterval(() => {
      playRandomPhoto();
    }, 2000);
  </script>
</body>
</html>
