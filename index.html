<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>土家族民俗文化数字遗产粒子交互系统</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'PingFang SC', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* 高级UI设计: 玻璃拟态侧边栏 */
        #glass-panel {
            position: absolute; top: 40px; left: 40px; width: 320px; z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: opacity 0.5s ease;
        }
        #glass-panel h2 { margin-top: 0; font-size: 24px; letter-spacing: 2px; color: #f0c987; }
        #glass-panel p { font-size: 14px; line-height: 1.8; color: #ccc; }

        /* 右下角摄像头与 MediaPipe 预览 */
        #video-container {
            position: absolute; bottom: 40px; right: 40px; width: 240px; height: 180px; z-index: 10;
            border-radius: 12px; overflow: hidden; border: 2px solid rgba(255,255,255,0.2);
        }
        #input_video { display: none; /* 隐藏原生视频，只显示canvas渲染骨架 */ }
        #output_canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        #status-indicator { position: absolute; bottom: 10px; left: 40px; z-index: 10; color: #00ff88; }
    </style>
    <!-- 引入 Three.js 和 GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- 引入 MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="glass-panel">
        <h2 id="culture-title">混沌星云</h2>
        <p id="culture-desc">请通过摄像头做出手势（握拳、张开、剪刀手、双指弹、鼓掌），或点击页面空白处，唤醒土家族数字文化遗产。</p>
    </div>

    <div id="video-container">
        <video id="input_video" autoplay playsinline></video>
        <canvas id="output_canvas" width="320" height="240"></canvas>
    </div>
    
    <div id="status-indicator">正在初始化系统...</div>

<script>
/**
 * 1. 核心数据与文案
 */
const cultureData = {
    nebula: { title: "混沌星云", desc: "万物伊始，文明孕育之中..." },
    brocade: { title: "土家织锦 (西兰卡普)", desc: "土家族的传统手工织锦，色彩热烈，构图精美，是土家族文化的活化石。" },
    tima: { title: "梯玛歌", desc: "土家族的神歌，由戴着面具的梯玛（巫师）演唱，用于祭祀祖先、祈求平安。" },
    corpse: { title: "湘西赶尸", desc: "神秘的湘西民俗，巫师手持法器在前，符纸随风飘动，体现了古人对落叶归根的执念。" },
    mortise: { title: "榫卯结构 (吊脚楼)", desc: "不用一根铁钉，仅凭木材的凹凸咬合，支撑起土家族依山而建的飞檐翘角。" },
    calligraphy: { title: "奇楼秘境·待你入戏", desc: "星云汇聚，化为千古绝笔，邀请您踏入这片神秘的土家疆域。" }
};

/**
 * 2. Three.js 粒子系统初始化
 */
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508); // 深邃黑
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 200;
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

// 粒子参数 (演示环境使用10万粒子，实际可用GPGPU扩充至百万)
const particleCount = 100000; 
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const targetPositions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);

// 初始化为混沌星云
for (let i = 0; i < particleCount; i++) {
    const r = 100 * Math.pow(Math.random(), 0.5);
    const theta = Math.random() * 2 * Math.PI;
    const phi = Math.acos(2 * Math.random() - 1);
    
    positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
    
    colors[i*3] = Math.random() * 0.5 + 0.5;
    colors[i*3+1] = Math.random() * 0.2 + 0.2;
    colors[i*3+2] = Math.random() * 0.8 + 0.2;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

// 自定义着色器材质（用于实现百万粒子的平滑过渡）
const material = new THREE.ShaderMaterial({
    uniforms: {
        uTime: { value: 0 },
        uProgress: { value: 0 } // 控制形变的权重 (0为星云，1为目标图案)
    },
    vertexShader: `
        uniform float uTime;
        attribute vec3 color;
        varying vec3 vColor;
        void main() {
            vColor = color;
            // 简单的呼吸效果
            vec3 pos = position;
            pos.x += sin(uTime + pos.y * 0.05) * 2.0;
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = 2.0 * (200.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    `,
    fragmentShader: `
        varying vec3 vColor;
        void main() {
            // 画圆
            float dist = length(gl_PointCoord - vec2(0.5));
            if(dist > 0.5) discard;
            gl_FragColor = vec4(vColor, 1.0 - (dist * 2.0));
        }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
});

const particleSystem = new THREE.Points(geometry, material);
scene.add(particleSystem);

/**
 * 3. 状态控制与UI更新
 */
let currentState = 'nebula';
let isAnimating = false;

function changeCultureState(stateKey) {
    if (currentState === stateKey || isAnimating) return;
    isAnimating = true;
    currentState = stateKey;

    // 1. 更新玻璃面板文案
    const titleEl = document.getElementById('culture-title');
    const descEl = document.getElementById('culture-desc');
    
    gsap.to([titleEl, descEl], { opacity: 0, duration: 0.3, onComplete: () => {
        titleEl.innerText = cultureData[stateKey].title;
        descEl.innerText = cultureData[stateKey].desc;
        // 如果是土家织锦，随机添加颜色前缀
        if(stateKey === 'brocade') {
            const colors = ['【红调】', '【蓝调】', '【黄调】'];
            titleEl.innerText = colors[Math.floor(Math.random() * colors.length)] + titleEl.innerText;
        }
        if(stateKey === 'calligraphy') {
            titleEl.style.color = '#FFD700'; // 书法黄色文字
        } else {
            titleEl.style.color = '#f0c987';
        }
        gsap.to([titleEl, descEl], { opacity: 1, duration: 0.5 });
    }});

    // 2. 触发粒子重构 (此处应执行从图像读取像素坐标赋值给 targetPositions 的逻辑)
    // 为演示，这里模拟粒子散开重新聚合的缩放效果
    gsap.to(particleSystem.scale, {
        x: 0.1, y: 0.1, z: 0.1, duration: 0.8, ease: "power2.in",
        onComplete: () => {
            // *实际开发中，这里应当更新 attributes.position，重新计算出插图的坐标*
            gsap.to(particleSystem.scale, { x: 1, y: 1, z: 1, duration: 1.2, ease: "elastic.out(1, 0.3)" });
            setTimeout(() => { isAnimating = false; }, 1200);
        }
    });
}

// 鼠标点击任意处随机触发
const states = ['brocade', 'tima', 'corpse', 'mortise', 'calligraphy'];
window.addEventListener('click', () => {
    const randomState = states[Math.floor(Math.random() * states.length)];
    changeCultureState(randomState);
});

/**
 * 4. MediaPipe 手势识别集成
 */
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const statusText = document.getElementById('status-indicator');

function detectGesture(landmarks, multiHandedness) {
    // 简化的手势算法逻辑 (基于指尖与掌根的距离)
    const thumbTip = landmarks[4];
    const indexTip = landmarks[8];
    const middleTip = landmarks[12];
    const ringTip = landmarks[16];
    const pinkyTip = landmarks[20];
    const wrist = landmarks[0];

    const getDist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);

    // 剪刀手 (食指中指伸出，其他弯曲)
    if (getDist(indexTip, wrist) > 0.5 && getDist(middleTip, wrist) > 0.5 && getDist(ringTip, wrist) < 0.4) {
        return 'corpse'; // 湘西赶尸
    }
    // 张开 (所有指尖距离手腕远)
    if (getDist(indexTip, wrist) > 0.6 && getDist(pinkyTip, wrist) > 0.5) {
        return 'tima'; // 梯玛歌
    }
    // 握拳 (所有指尖距离手腕极近)
    if (getDist(indexTip, wrist) < 0.3 && getDist(middleTip, wrist) < 0.3) {
        return 'brocade'; // 织锦
    }
    // 双指互弹 (大拇指和中指/食指极近)
    if (getDist(thumbTip, indexTip) < 0.05 || getDist(thumbTip, middleTip) < 0.05) {
        return 'mortise'; // 榫卯
    }
    return null;
}

function onResults(results) {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        // 如果检测到两只手，判断鼓掌逻辑 (两只手的手腕距离拉近)
        if (results.multiHandLandmarks.length === 2) {
            const distHands = Math.hypot(
                results.multiHandLandmarks[0][0].x - results.multiHandLandmarks[1][0].x,
                results.multiHandLandmarks[0][0].y - results.multiHandLandmarks[1][0].y
            );
            if (distHands < 0.2) {
                changeCultureState('calligraphy');
            }
        } else {
            // 单手手势识别
            for (const landmarks of results.multiHandLandmarks) {
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 2});
                
                const gesture = detectGesture(landmarks, results.multiHandedness);
                if(gesture) { changeCultureState(gesture); }
            }
        }
    }
    canvasCtx.restore();
}

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
hands.onResults(onResults);

const cameraMP = new Camera(videoElement, {
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 320, height: 240
});
cameraMP.start().then(() => { statusText.innerText = "系统就绪，摄像头已开启"; });

/**
 * 5. 渲染循环与窗口适配
 */
const clock = new THREE.Clock();
function animate() {
    requestAnimationFrame(animate);
    material.uniforms.uTime.value = clock.getElapsedTime();
    
    // 星云基础旋转
    if (currentState === 'nebula') {
        particleSystem.rotation.y += 0.002;
        particleSystem.rotation.x += 0.001;
    }
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
